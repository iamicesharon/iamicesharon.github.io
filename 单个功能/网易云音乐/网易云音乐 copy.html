<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
		<title>网易云免费音乐</title>
		<meta name="viewport"
		content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
			  <style>
	body {
	   background-image: url('../things/image/背景.jpeg');
	            background-size: cover;
	            background-position: center;
	            height: 100%;
	}
	
	.container {
	    max-width: 600px;
	    margin: 0 auto;
	    padding: 20px;
	}
	
	header {
	    text-align: center;
	    margin-bottom: 20px;
	}
	
	.content  {
	    border: 1px solid #ccc;
	    background-color: #ffffff6e;
	    padding: 20px;
		border: 0;
	}
	
	.search {
	    display: flex;
	    justify-content: center;
	    align-items: center;
	    margin-bottom: 20px;
	}
	
	.search input[type="text"] {
	    width: 70%;
	    padding: 10px;
	    font-size: 16px;
	    border: none;
	    border-radius: 20px;
	    outline: none;
	}
	
	.search button {
	    padding: 10px 20px;
	    font-size: 16px;
	    background-color: #4CAF50;
	    color: #fff;
	    border: none;
	    border-radius: 20px;
	    cursor: pointer;
	    transition: background-color 0.3s ease;
	}
	
	.search button:hover {
	    background-color: #45a049;
	}
	
	.player {
	    text-align: center;
	    margin-bottom: 20px;
	}
	
	.album {
	    width: 200px;
	    height: 200px;
	    background-image: url(../things/image/背景.jpeg);
	    background-size: cover;
	    background-position: center;
	    border-radius: 50%;
	    margin: 0 auto;
	    box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
		  animation: rotate 5s infinite linear;
	}
	.album::before {
	  content: "";
	  position: absolute;
	  top: 0;
	  left: 0;
	  width: 100%;
	  height: 100%;
	    border-radius: 50%;
	 
	  opacity: 0;
	  transition: opacity 0.3s ease; /* 添加过渡效果 */
	}
	
	.album:hover::before {
	  opacity: 1; /* 悬浮时显示蒙版 */
	  	content: '';
		  background-image: url(https://pic8.58cdn.com.cn/p1/big/n_v29b10166e658e4052a5da8868d612c7ef.png); 
		  	  animation-play-state: paused; /* 悬浮时暂停动画 */
		  	  		  display: inline-block;
		  width: 50px;
		  height: 50px;
				  background-size: contain;
				  background-repeat: no-repeat;
				  
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
	}
	
	
	.mengban:hover::before,
	.mengban:hover::after {
	
		z-index: 1;
	  animation-play-state: paused; /* 悬浮时暂停动画 */
	}
	
	.mengban::before,
	.mengban::after {
	  pointer-events: none; /* 防止蒙版和图标干扰鼠标事件 */
	}

	.lyricsa {
	   height: 150px; /* 歌词容器的固定高度 */
      overflow: hidden; /* 隐藏超出容器高度的歌词内容 */
	}
	
	.lyrics ul {
	    list-style-type: none;
	          animation: scroll-lyrics 10s linear infinite; /* 歌词的滚动动画效果 */
	    padding: 0;
	    margin: 0;
	      height: 150px; /* 歌词容器的固定高度 */
   /*   overflow: hidden;  隐藏超出容器高度的歌词内容 */
	}
	
	.lyrics li {
	    list-style-type: none;
	         height: 50px; /* 每行歌词的高度 */
      line-height: 50px;
      font-size: 20px;
	      opacity: 0.6; /* 初始透明度 */
      transition: opacity 0.3s ease-in-out; /* 过渡效果 */
	    padding: 10px;
	  border-bottom: 1px solid #0029f129;
	  text-align: center;
	} 
	.lyrics li.highlight {
      opacity: 1; /* 高亮时透明度 */
      animation: floating 2s infinite alternate; /* 悬浮动画效果 */

      color: blue; /* 设置高亮的字体颜色为蓝色 */
      font-weight: bold; /* 设置高亮的字体加粗 */
    }
	footer {
	    text-align: center;
	}
	
	.tags .tag {
	    display: inline-block;
	    padding: 6px 12px;
	    font-size: 16px;
	    background-color: #f2f2f2;
	    border-radius: 20px;
	    margin: 5px;
	    transition: background-color 0.3s ease;
	}
	
	.tags .tag:hover {
	    background-color: #ddd;
	}
  table {
        border-collapse: collapse;
        width: 100%;
    }

    th, td {
        padding: 8px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }

    th {
        background-color: #f2f2f2;
    }

    tr:hover {
        background-color: #f5f5f5;
    }
	.trtd:hover {
	  cursor: pointer;
	  color: #0091fb;
	  /* 其他样式 */
	}
	@keyframes rotate {
	  0% {
	    transform: rotate(0deg);
	  }
	  100% {
	    transform: rotate(360deg);
	  }
	}
</style>
